    function speak(text, rate = 1) {
      if (typeof speechSynthesis === "undefined") return;

      const u = new SpeechSynthesisUtterance(text.replace(/[❌✅]/g, ""));

      speechSynthesis.speak(u);

      const hedges = (transcript.match(/\b(maybe|just|sorry|i think|i guess|kind of|sort of|probably)\b/gi) || []).length;
      return { words: words.length, fillers, hedges };

        React.createElement("p", { style: { color: C.grayText, fontSize: 16.5, lineHeight: 1.55, margin: "16px auto 0", maxWidth: 420 } }, "10 phrasal verbs + 3 vocab + power phrases + AI coach + role-play scenarios + skill kits. 15 min daily for 28 days."),

    function Dashboard({ day, completed, streak, doneToday, onTrain, onReset }) {

          React.createElement("div", { style: { fontFamily: "'Bricolage Grotesque', system-ui", fontWeight: 800, fontSize: 19, color: C.indigoDeep, letterSpacing: 1 } }, "SAYSO"),

        React.createElement("p", { style: { color: C.grayText, fontSize: 15, marginTop: 6 } }, "This week: ", React.createElement("strong", { style: { color: C.ink } }, week.name), " — ", week.desc.toLowerCase()),
        doneToday && React.createElement("div", { style: { background: "#EAF8F1", border: `2px solid ${C.green}`, borderRadius: 14, padding: "12px 16px", marginTop: 14, fontSize: 14, color: "#1B6B49", fontWeight: 600 } }, "✅ Today's session is done. Day ", Math.min(day + 1, 28), " unlocks tomorrow."),

        React.createElement("p", { style: { fontSize: 12.5, color: C.grayText, marginTop: 16, textAlign: "center" } }, "10 phrasal verbs + 3 vocab + power phrases daily = 140 verbs & 84 words by Day 28 ☕"),
        React.createElement("p", { style: { textAlign: "center", marginTop: 8 } }, React.createElement("button", { onClick: onReset, style: { border: "none", background: "none", color: "#B9B5CF", fontSize: 12, cursor: "pointer", textDecoration: "underline" } }, "Reset my plan & start over"))

    function Session({ day, onNext }) {
      const w = Math.min(Math.floor((day - 1) / 7), 3), d = (day - 1) % 7;
      const [exIdx, setExIdx] = useState(0), [left, setLeft] = useState(90), [running, setRunning] = useState(false), [typed, setTyped] = useState("");
      const [feedback, setFeedback] = useState(null), [feedbackLoading, setFeedbackLoading] = useState(false);
      const [listening, setListening] = useState(false), [micError, setMicError] = useState("");
      const recogRef = useRef(null);
      const done = left === 0;

      function toggleMic() {
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) {
          setMicError("Your browser doesn't support speech recognition. Try Chrome or Edge on desktop. You can still type below.");
          return;
        }
        if (listening) {
          if (recogRef.current) recogRef.current.stop();
          setListening(false);
          return;
        }
        setMicError("");
        const r = new SR();
        r.lang = "en-US";
        r.continuous = true;
        r.interimResults = true;
        let finalText = typed ? typed + " " : "";
        r.onresult = (e) => {
          let interim = "";
          for (let i = e.resultIndex; i < e.results.length; i++) {
            const t = e.results[i][0].transcript;
            if (e.results[i].isFinal) finalText += t + " ";
            else interim += t;
          }
          setTyped((finalText + interim).trimStart());
        };
        r.onerror = (e) => {
          setListening(false);

            setMicError("Microphone permission was blocked. Click the 🔒 in your address bar → allow microphone → try again.");
          } else if (e.error === "no-speech") {

          } else {
            setMicError("Mic error: " + e.error + ". You can type below instead.");
          }
        };
        r.onend = () => setListening(false);
        recogRef.current = r;
        try { r.start(); setListening(true); if (!running) setRunning(true); }
        catch (err) { setMicError("Couldn't start the mic. You can type below instead."); }
      }

      useEffect(() => () => { if (recogRef.current) try { recogRef.current.stop(); } catch {} }, []);

          ex.items ? React.createElement("div", { style: { textAlign: "left", maxHeight: 300, overflowY: "auto" } },

                React.createElement("div", { style: { display: "flex", gap: 6 } }, React.createElement(ListenBtn, { text: it[2], small: true }), React.createElement(ListenBtn, { text: it[2], rate: 0.75, small: true }))
